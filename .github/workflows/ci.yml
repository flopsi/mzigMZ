name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        run: zig build
      - name: Run unit tests
        run: zig build test

      # NOTE: Ground-truth verification (verify-passthrough, verify-encode,
      # verify-profile, verify-ground-truth) requires real Thermo .raw files
      # which cannot be committed to the repo (10+ GB each). These tools
      # are run manually against D:/000projects/test_files/ on dev
      # machines. See AGENTS.md for the no-synthetic-data rule.
